<section>
  <h2>My Orders</h2>
  <button (click)="loadOrders()">Get my orders</button>
  <div class="orders">
    @for (order of orders; track order.id) {
      <div class="order">
        <p><strong>Order-ID:</strong> {{ order.id }}</p>
        <p><strong>Status:</strong> {{ order.status }}</p>
        @for (item of order.items; track item.productTitle) {
          <p>{{ item.productTitle }} x {{ item.quantity }}</p>
        }
      </div>
    }
  </div>
  @if (message) {
    <p>{{ message }}</p>
  }
</section>
